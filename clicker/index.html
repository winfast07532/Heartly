<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Heartbeat — Clicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="clicker-styles.css" />
</head>
<body>
  <div id="app">
<div id="loading-screen">
  <div class="loading-logo">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z"/></svg>
  </div>
  <div class="loading-title">Heartbeat</div>
  <div class="loading-sub">Love Clicker</div>
  <div class="loading-bar-bg"><div class="loading-bar-fill" id="loading-bar"></div></div>
</div>


    <!-- BACKGROUND PARTICLES -->
    <canvas id="bg-canvas"></canvas>

    <!-- TOP BAR -->
    <header id="top-bar">
      <div id="game-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#e05c7a" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z"/></svg>
        Heartbeat
      </div>
      <div id="header-stats">
        <div class="stat-chip">
          <span class="stat-label">Per Click</span>
          <span class="stat-val" id="hdr-per-click">0.1</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">Per Second</span>
          <span class="stat-val" id="hdr-per-sec">0</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">Total Earned</span>
          <span class="stat-val" id="hdr-total">0</span>
        </div>
      </div>
      <div id="header-actions">
        <button class="icon-btn" id="btn-save" title="Save Game">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <button class="icon-btn" id="btn-reset" title="Reset Game">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        </button>
      </div>
    </header>

    <!-- MAIN LAYOUT -->
    <main id="main-layout">

      <!-- LEFT PANEL: UPGRADES -->
      <aside id="left-panel" class="panel">
        <div class="panel-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Upgrades
          <span id="upgrade-count-badge" class="badge">0</span>
        </div>
        <div id="upgrade-filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="click">Click</button>
          <button class="filter-btn" data-filter="passive">Passive</button>
          <button class="filter-btn" data-filter="multiplier">Multiplier</button>
        </div>
        <div id="upgrade-list"></div>
      </aside>

      <!-- CENTER: HEART CLICKER -->
      <section id="center-panel">
        <div id="points-display">
          <div id="points-value">0</div>
          <div id="points-label">Hearts</div>
        </div>

        <div id="heart-container">
          <div id="heart-glow-ring"></div>
          <div id="heart-bg-pulse"></div>
          <button id="heart-btn" aria-label="Click to earn hearts">
            <svg id="heart-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="heartGrad" cx="40%" cy="35%" r="60%">
                  <stop offset="0%" stop-color="#ff8fab"/>
                  <stop offset="50%" stop-color="#e05c7a"/>
                  <stop offset="100%" stop-color="#9b1a3a"/>
                </radialGradient>
                <filter id="heartGlow">
                  <feGaussianBlur stdDeviation="3" result="blur"/>
                  <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
              </defs>
              <path d="M50 85 C50 85 10 60 10 35 C10 20 20 10 35 10 C42 10 48 14 50 18 C52 14 58 10 65 10 C80 10 90 20 90 35 C90 60 50 85 50 85 Z"
                fill="url(#heartGrad)" filter="url(#heartGlow)"/>
            </svg>
            <div id="click-ripple"></div>
          </button>
          <div id="floating-texts-container"></div>
        </div>

        <div id="center-stats">
          <div class="c-stat">
            <div class="c-stat-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <div>
              <div class="c-stat-label">Multiplier</div>
              <div class="c-stat-val" id="cs-multiplier">x1.0</div>
            </div>
          </div>
          <div class="c-stat">
            <div class="c-stat-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div>
              <div class="c-stat-label">Play Time</div>
              <div class="c-stat-val" id="cs-playtime">0s</div>
            </div>
          </div>
          <div class="c-stat">
            <div class="c-stat-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            </div>
            <div>
              <div class="c-stat-label">Total Clicks</div>
              <div class="c-stat-val" id="cs-clicks">0</div>
            </div>
          </div>
        </div>
      </section>

      <!-- RIGHT PANEL: ACHIEVEMENTS & MILESTONES -->
      <aside id="right-panel" class="panel">
        <div class="panel-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
          Achievements
          <span id="ach-count-badge" class="badge">0</span>
        </div>
        <div id="right-panel-scroll">
          <div id="achievement-list"></div>

          <div class="panel-header" style="margin-top:0;border-top:1px solid var(--border);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            Milestones
          </div>
          <div id="milestone-list"></div>
        </div>
      </aside>

    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav id="mobile-nav">
      <button class="nav-tab active" data-panel="center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z"/></svg>
        <span>Click</span>
      </button>
      <button class="nav-tab" data-panel="upgrades">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Upgrades</span>
      </button>
      <button class="nav-tab" data-panel="achievements">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
        <span>Trophies</span>
      </button>
    </nav>

    <!-- TOAST NOTIFICATION -->
    <div id="toast-container"></div>

    <!-- SAVE INDICATOR -->
    <div id="save-indicator">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Saved
    </div>

    <!-- RESET MODAL -->
    <div id="reset-modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
        <div class="modal-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#e05c7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <h2 class="modal-title">Reset All Progress?</h2>
        <p class="modal-desc">This will permanently erase all your hearts, upgrades, and achievements. This action cannot be undone.</p>
        <div class="modal-actions">
          <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
          <button class="modal-btn confirm" id="modal-confirm">Reset Everything</button>
        </div>
      </div>
    </div>

  </div>
  <script src="clicker-script.js"></script>
</body>
</html>
